<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Style Prediction</title>
</head>
<body>
    <h2>Learning Style Assessment</h2>
    <form id="learningStyleForm">

        <label>1. How much time do you spend interacting with images while studying?</label>
        <select name="q1">
            <option value="1">Very little</option>
            <option value="2">Moderate amount</option>
            <option value="3">A lot</option>
        </select><br><br>

        <label>2. How often do you watch video-based learning materials?</label>
        <select name="q2">
            <option value="1">Rarely</option>
            <option value="2">Sometimes</option>
            <option value="3">Often</option>
        </select><br><br>

        <label>3. How much time do you dedicate to reading text-based materials?</label>
        <select name="q3">
            <option value="1">Very little</option>
            <option value="2">Moderate amount</option>
            <option value="3">A lot</option>
        </select><br><br>

        <label>4. How frequently do you listen to audio materials?</label>
        <select name="q4">
            <option value="1">Rarely</option>
            <option value="2">Sometimes</option>
            <option value="3">Often</option>
        </select><br><br>

        <label>5. Do you prefer studying basic concepts or deep, complex topics?</label>
        <select name="q5">
            <option value="1">Simple and straightforward</option>
            <option value="2">Moderate complexity</option>
            <option value="3">Deep and complex</option>
        </select><br><br>

        <label>6. How often do you use PowerPoint slides for studying?</label>
        <select name="q6">
            <option value="1">Never</option>
            <option value="2">Occasionally</option>
            <option value="3">Frequently</option>
        </select><br><br>

        <label>7. When studying, do you prefer real-world examples and case studies?</label>
        <select name="q7">
            <option value="1">No, I prefer theories</option>
            <option value="2">Sometimes</option>
            <option value="3">Yes, I love practical examples</option>
        </select><br><br>

        <label>8. How would you describe your overall academic performance?</label>
        <select name="q8">
            <option value="1">Below average</option>
            <option value="2">Average</option>
            <option value="3">Above average</option>
        </select><br><br>

        <label>9. How often do you answer standard practice questions?</label>
        <select name="q9">
            <option value="1">Rarely</option>
            <option value="2">Sometimes</option>
            <option value="3">Frequently</option>
        </select><br><br>

        <label>10. How often do you participate in online discussions?</label>
        <select name="q10">
            <option value="1">Never</option>
            <option value="2">Occasionally</option>
            <option value="3">Frequently</option>
        </select><br><br>

        <label>11. How much time do you spend solving exercises?</label>
        <select name="q11">
            <option value="1">Very little</option>
            <option value="2">Moderate amount</option>
            <option value="3">A lot</option>
        </select><br><br>

        <label>12. Do you prefer group discussions while learning?</label>
        <select name="q12">
            <option value="1">No, I prefer studying alone</option>
            <option value="2">Sometimes</option>
            <option value="3">Yes, I learn best in groups</option>
        </select><br><br>

        <label>13. How often do you skip lessons or topics?</label>
        <select name="q13">
            <option value="1">Never</option>
            <option value="2">Occasionally</option>
            <option value="3">Frequently</option>
        </select><br><br>

        <label>14. How often do you click the "Next" button quickly in online learning?</label>
        <select name="q14">
            <option value="1">Never</option>
            <option value="2">Occasionally</option>
            <option value="3">Frequently</option>
        </select><br><br>

        <label>15. On average, how much time do you spend per study session?</label>
        <select name="q15">
            <option value="1">Less than 30 minutes</option>
            <option value="2">30-60 minutes</option>
            <option value="3">More than 1 hour</option>
        </select><br><br>

        <label>16. How often do you attempt quizzes or tests on different topics?</label>
        <select name="q16">
            <option value="1">Rarely</option>
            <option value="2">Sometimes</option>
            <option value="3">Frequently</option>
        </select><br><br>

        <label>17. Do you actively ask questions when you don’t understand a topic?</label>
        <select name="q17">
            <option value="1">No, I prefer finding answers myself</option>
            <option value="2">Sometimes</option>
            <option value="3">Yes, I ask questions frequently</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>

    <h3>Predicted Learning Style: <span id="predictionResult"></span></h3>

    <script src="script.js"></script>
</body>
</html>
